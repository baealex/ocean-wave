name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'README.md'
      - '.dockerignore'
      - '.gitignore'
      - '.nvmrc'
      - 'biome.json'
      - 'docker-compose.yml'
      - 'lefthook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'playwright.config.ts'
      - 'patches/**'
      - 'scripts/**'
      - 'docs/architecture/**'
      - 'docs/process/**'
      - 'tests/branding/**'
      - 'tests/e2e/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'README.md'
      - '.dockerignore'
      - '.gitignore'
      - '.nvmrc'
      - 'biome.json'
      - 'docker-compose.yml'
      - 'lefthook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'playwright.config.ts'
      - 'patches/**'
      - 'scripts/**'
      - 'docs/architecture/**'
      - 'docs/process/**'
      - 'tests/branding/**'
      - 'tests/e2e/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-impact:
    name: detect android impact
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.android-impact.outputs.should-run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed files
        id: android-impact
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should-run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -z "${BASE_SHA}" ] || [[ "${BASE_SHA}" =~ ^0+$ ]]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r "${HEAD_SHA}")"
          else
            changed_files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          fi

          printf '%s\n' "${changed_files}"

          should_run=false
          while IFS= read -r file; do
            case "${file}" in
              packages/mobile/*|patches/*|pnpm-lock.yaml|.github/workflows/CI.yml)
                should_run=true
                break
                ;;
            esac
          done <<< "${changed_files}"

          echo "should-run=${should_run}" >> "${GITHUB_OUTPUT}"

  build:
    name: build (Node 22.12)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Print tool versions
        run: |
          node --version
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test (Repository Metadata)
        run: pnpm test:metadata

      - name: Test (Server)
        run: pnpm test:server

      - name: Test (Client)
        run: pnpm test:client

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Test (Multi-browser E2E)
        run: pnpm test:e2e

  android-mobile:
    name: android mobile assemble
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: android-impact
    if: needs.android-impact.outputs.should-run == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Assemble Android debug APK
        working-directory: packages/mobile/android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v7
        with:
          name: ocean-wave-pocket-debug-apk
          path: packages/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
