name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'README.md'
      - '.dockerignore'
      - '.gitignore'
      - '.nvmrc'
      - 'biome.json'
      - 'docker-compose.yml'
      - 'lefthook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'patches/**'
      - 'scripts/**'
      - 'docs/process/**'
      - 'tests/branding/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'README.md'
      - '.dockerignore'
      - '.gitignore'
      - '.nvmrc'
      - 'biome.json'
      - 'docker-compose.yml'
      - 'lefthook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'patches/**'
      - 'scripts/**'
      - 'docs/process/**'
      - 'tests/branding/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (Node 22.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Print tool versions
        run: |
          node --version
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test (Repository Metadata)
        run: pnpm test:metadata

      - name: Test (Server)
        run: pnpm test:server

      - name: Test (Client)
        run: pnpm test:client

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Build
        run: pnpm build

  android-mobile:
    name: android mobile assemble
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Assemble Android debug APK
        working-directory: packages/mobile/android
        run: ./gradlew :app:assembleDebug --no-daemon

