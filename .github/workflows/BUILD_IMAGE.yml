name: BUILD IMAGE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Build local smoke image
        run: docker build --pull -t ocean-wave:smoke -f ./packages/server/Dockerfile .

      - name: Smoke local Docker image
        run: SMOKE_IMAGE=ocean-wave:smoke node tests/smoke/docker-server-smoke.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./packages/server/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: baealex/ocean-wave:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize pushed image digest
        env:
          IMAGE_NAME: baealex/ocean-wave
          IMAGE_TAG: latest
          IMAGE_DIGEST: ${{ steps.build_push.outputs.digest }}
          GIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$IMAGE_DIGEST" ]; then
            echo "Docker build-push-action did not return an image digest." >&2
            exit 1
          fi

          {
            echo "## Docker latest image"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Tag | \`${IMAGE_NAME}:${IMAGE_TAG}\` |"
            echo "| Digest | \`$IMAGE_DIGEST\` |"
            echo "| Commit | \`$GIT_SHA\` |"
            echo "| Pull by digest | \`docker pull ${IMAGE_NAME}@${IMAGE_DIGEST}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
